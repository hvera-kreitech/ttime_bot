name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build static binary
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Deploy to Lightsail
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            target/x86_64-unknown-linux-musl/release/ttime-bot \
            $USER@$HOST:/usr/local/bin/ttime-bot

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $USER@$HOST \
            "sudo systemctl restart ttime-bot && sudo systemctl status ttime-bot --no-pager"

          rm /tmp/deploy_key
